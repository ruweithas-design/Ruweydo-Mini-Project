<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somali Tech Solution</title>
    <link rel="stylesheet" href="form.css">

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: silver;
            margin: 0;
            padding: 20px;
        }

        header{
            background-color: aliceblue;
            color: black;
            text-align: center;
            padding: 15px;
        }

        nav{
            float: right;
            width: 150px;
            padding: 10px;
        }

        nav ul{
            list-style-type: none;
        }

        nav ul li{
            margin: 10px 0;
        }

        nav ul li a{
            text-decoration: none;
        }

        form{
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgb(39, 39, 194);
        }

        fieldset{
            border: 2px solid rgb(38, 41, 194);
            padding: 20px;
            border-radius: 10px;
        }

        legend{
            font-size: 1.5em;
            font-weight: bold;
        }

        label{
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input,
        select{
            width: 100%;
            padding: 10px;
            border: 1px solid black;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .gender input{
            width: auto;
            margin-right: 5px;
        }

        footer{
            text-align: center;
            background-color: white;
            color: black;
            margin-top: 20px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Registration Page</h2>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="photo.html">Photo</a></li>
            <li><a href="form.html">Registration</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <form action="">
        <fieldset>

            <legend>Isdiiwaan Gelinta Macaamiisha</legend>

            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">

            <label for="pass">Password:</label>
            <input type="password" id="pass" name="pass" placeholder="Enter your password">

            <label for="tell">Phone Number:</label>
            <input type="tel" id="tell" name="tell" placeholder="Enter your phone number">

            <h3>Choose Your Gender:</h3>

            <div class="gender">
                <input type="radio" name"gender" id="male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender">
                <label for="female">Female</label>
            </div>

            <h3>Dooro Magaalada Aad Joogto</h3>

            <select name="magaalada" id="magaalada">
                <option value="Mogadishu">Mogadishu</option>
                <option value="Hargeysa">Hargeysa</option>
                <option value="Garowe">Garowe</option>
                <option value="Kismaayo">Kismaayo</option>
            </select>

            <label for="dhalashada">Dooro Xiliga Aad Dhalatay:</label>
            <input type="date" id="dhalashada" name="dhalashada">

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </fieldset>
    </form>

    <footer>
        <h3>Xaquuqda Website-ka waxaa leh &copy; STS 2020</h3>
    </footer>

</body>
</html>
